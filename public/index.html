<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Databricks Secrets</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f11;
      --surface: #1a1a1f;
      --surface2: #222228;
      --border: #2e2e38;
      --accent: #ff3621;
      --accent-dim: rgba(255,54,33,0.12);
      --text: #e8e8ec;
      --muted: #7a7a8a;
      --green: #2ecc71;
      --red: #e74c3c;
      --yellow: #f39c12;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 13px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
    }

    .logo {
      width: 22px; height: 22px;
      background: var(--accent);
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: white;
      flex-shrink: 0;
    }

    header h1 { font-size: 14px; font-weight: 600; color: var(--text); }

    /* Profile chip in header */
    #profile-chip {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .profile-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 4px 10px;
      font-size: 11px;
      color: var(--muted);
    }

    .profile-badge .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
    }

    .profile-badge .dot.invalid { background: var(--red); }
    .profile-badge .name { color: var(--text); }

    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
      height: calc(100vh - 51px);
    }

    /* Sidebar */
    .sidebar {
      width: 240px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      background: var(--surface);
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sidebar-header span { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }

    .scopes-list { flex: 1; overflow-y: auto; padding: 6px 0; }

    .scope-item {
      padding: 8px 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      border-left: 2px solid transparent;
      color: var(--muted);
      transition: background 0.1s, color 0.1s;
    }

    .scope-item:hover { background: var(--surface2); color: var(--text); }
    .scope-item.active { border-left-color: var(--accent); background: var(--accent-dim); color: var(--text); }
    .scope-item .scope-icon { font-size: 10px; }
    .scope-item .scope-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .scope-type { font-size: 10px; color: var(--muted); margin-left: auto; }

    /* Main */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .main-header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      flex-shrink: 0;
    }

    .tabs { display: flex; gap: 2px; }

    .tab {
      padding: 5px 12px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
      color: var(--muted);
      transition: background 0.1s, color 0.1s;
    }

    .tab:hover { background: var(--surface2); color: var(--text); }
    .tab.active { background: var(--accent-dim); color: var(--accent); }

    .main-actions { margin-left: auto; display: flex; gap: 8px; }

    .content { flex: 1; overflow-y: auto; padding: 20px; }

    /* Empty state */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      color: var(--muted);
    }

    .empty .icon { font-size: 36px; opacity: 0.3; }
    .empty p { font-size: 12px; }
    .empty .hint { font-size: 11px; color: var(--muted); opacity: 0.7; font-family: monospace; }

    /* Table */
    .table-wrap { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }

    table { width: 100%; border-collapse: collapse; }

    th {
      background: var(--surface2);
      padding: 8px 14px;
      text-align: left;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      vertical-align: middle;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }

    .key-cell { font-weight: 500; color: var(--text); }
    .ts-cell { color: var(--muted); font-size: 11px; }

    .row-actions { display: flex; gap: 6px; justify-content: flex-end; }

    /* Buttons */
    .btn {
      padding: 5px 12px;
      border-radius: 5px;
      border: 1px solid var(--border);
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      transition: all 0.1s;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .btn-primary { background: var(--accent); border-color: var(--accent); color: white; }
    .btn-primary:hover { opacity: 0.85; }

    .btn-ghost { background: transparent; color: var(--muted); }
    .btn-ghost:hover { background: var(--surface2); color: var(--text); }

    .btn-danger { background: transparent; color: var(--red); border-color: transparent; }
    .btn-danger:hover { background: rgba(231,76,60,0.12); border-color: var(--red); }

    .btn-icon { padding: 4px 8px; font-size: 11px; }

    .btn:disabled { opacity: 0.4; cursor: default; }

    /* Modal */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(3px);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }

    .overlay.hidden { display: none; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 24px;
      width: 420px;
      max-width: 95vw;
    }

    .modal h2 { font-size: 15px; margin-bottom: 6px; font-weight: 600; }
    .modal .modal-sub { font-size: 11px; color: var(--muted); margin-bottom: 18px; }

    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.06em; }

    input, textarea, select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      font-family: inherit;
      font-size: 12px;
      padding: 8px 10px;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus, textarea:focus, select:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 72px; }

    .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

    /* Profile picker */
    #modal-profile .modal { width: 480px; }

    .profile-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 4px; }

    .profile-option {
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 12px 14px;
      cursor: pointer;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      transition: border-color 0.15s, background 0.15s;
    }

    .profile-option:hover { background: var(--surface2); border-color: var(--muted); }
    .profile-option.selected { border-color: var(--accent); background: var(--accent-dim); }

    .profile-option .po-indicator {
      width: 14px; height: 14px;
      border-radius: 50%;
      border: 2px solid var(--border);
      flex-shrink: 0;
      margin-top: 1px;
      transition: border-color 0.15s;
    }

    .profile-option.selected .po-indicator { border-color: var(--accent); background: var(--accent); }

    .profile-option .po-body { flex: 1; min-width: 0; }
    .profile-option .po-name { font-weight: 600; font-size: 12px; color: var(--text); display: flex; align-items: center; gap: 6px; }
    .profile-option .po-host { font-size: 11px; color: var(--muted); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .tag {
      font-size: 10px; padding: 1px 5px; border-radius: 3px; font-weight: 500;
    }

    .tag-valid { background: rgba(46,204,113,0.12); color: var(--green); }
    .tag-invalid { background: rgba(231,76,60,0.12); color: var(--red); }
    .tag-default { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

    .auth-hint {
      margin-top: 10px;
      padding: 10px 12px;
      background: rgba(231,76,60,0.08);
      border: 1px solid rgba(231,76,60,0.2);
      border-radius: 6px;
      font-size: 11px;
      color: var(--muted);
      display: none;
    }

    .auth-hint code { color: var(--text); background: var(--surface2); padding: 1px 5px; border-radius: 3px; }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 24px; right: 24px;
      padding: 10px 16px;
      border-radius: 7px;
      font-size: 12px;
      z-index: 200;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s;
      max-width: 340px;
      pointer-events: none;
    }

    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.success { background: #1a3a28; border: 1px solid var(--green); color: var(--green); }
    #toast.error { background: #3a1a1a; border: 1px solid var(--red); color: var(--red); }

    /* ACL badges */
    .perm { font-size: 10px; padding: 2px 6px; border-radius: 3px; font-weight: 600; }
    .perm-READ { background: rgba(46,204,113,0.12); color: var(--green); }
    .perm-WRITE { background: rgba(243,156,18,0.12); color: var(--yellow); }
    .perm-MANAGE { background: rgba(255,54,33,0.12); color: var(--accent); }

    .spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-row td { text-align: center; padding: 24px; color: var(--muted); }

    .confirm-text { font-size: 12px; color: var(--muted); margin-bottom: 16px; }
    .confirm-text strong { color: var(--red); }
  </style>
</head>
<body>
  <header>
    <div class="logo">DB</div>
    <h1>Secrets Manager</h1>
    <div id="profile-chip">
      <!-- filled by JS -->
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <span>Scopes</span>
        <button class="btn btn-ghost btn-icon" id="btn-new-scope" title="New scope">+ New</button>
      </div>
      <div class="scopes-list" id="scopes-list">
        <div style="padding:20px;text-align:center;color:var(--muted);font-size:11px;">
          <span class="spinner"></span> Loading…
        </div>
      </div>
    </aside>

    <main class="main">
      <div class="main-header" id="main-header" style="display:none;">
        <div class="tabs">
          <div class="tab active" data-tab="secrets">Secrets</div>
          <div class="tab" data-tab="acls">ACLs</div>
        </div>
        <div class="main-actions">
          <button class="btn btn-ghost btn-icon" id="btn-refresh">↺ Refresh</button>
          <button class="btn btn-primary btn-icon" id="btn-add">+ Add</button>
          <button class="btn btn-danger btn-icon" id="btn-delete-scope">Delete scope</button>
        </div>
      </div>
      <div class="content" id="content">
        <div class="empty">
          <div class="icon">🔐</div>
          <p>Select a scope to manage secrets</p>
        </div>
      </div>
    </main>
  </div>

  <!-- Profile picker (blocks UI until a valid profile is selected) -->
  <div class="overlay hidden" id="modal-profile">
    <div class="modal">
      <h2>Select a Profile</h2>
      <p class="modal-sub" id="profile-modal-reason">Choose a Databricks CLI profile to connect with.</p>
      <div class="profile-list" id="profile-list"></div>
      <div class="auth-hint" id="auth-hint">
        This profile is not authenticated. Run <code id="auth-hint-cmd"></code> in your terminal, then click Retry.
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost hidden" id="btn-profile-retry">↺ Retry</button>
        <button class="btn btn-primary" id="btn-profile-connect">Connect</button>
      </div>
    </div>
  </div>

  <!-- Modal: New Scope -->
  <div class="overlay hidden" id="modal-scope">
    <div class="modal">
      <h2>Create Secret Scope</h2>
      <div class="field">
        <label>Scope Name</label>
        <input id="input-scope-name" type="text" placeholder="my-scope" autocomplete="off" />
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="btn-scope-cancel">Cancel</button>
        <button class="btn btn-primary" id="btn-scope-create">Create</button>
      </div>
    </div>
  </div>

  <!-- Modal: Add/Edit Secret -->
  <div class="overlay hidden" id="modal-secret">
    <div class="modal">
      <h2 id="modal-secret-title">Add Secret</h2>
      <div class="field" id="field-key">
        <label>Key</label>
        <input id="input-secret-key" type="text" placeholder="my-api-key" autocomplete="off" />
      </div>
      <div class="field">
        <label>Value</label>
        <textarea id="input-secret-value" placeholder="Secret value…"></textarea>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="btn-secret-cancel">Cancel</button>
        <button class="btn btn-primary" id="btn-secret-save">Save</button>
      </div>
    </div>
  </div>

  <!-- Modal: Add ACL -->
  <div class="overlay hidden" id="modal-acl">
    <div class="modal">
      <h2>Add / Update ACL</h2>
      <div class="field">
        <label>Principal (user or group)</label>
        <input id="input-acl-principal" type="text" placeholder="user@example.com" autocomplete="off" />
      </div>
      <div class="field">
        <label>Permission</label>
        <select id="input-acl-perm">
          <option value="READ">READ</option>
          <option value="WRITE">WRITE</option>
          <option value="MANAGE">MANAGE</option>
        </select>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="btn-acl-cancel">Cancel</button>
        <button class="btn btn-primary" id="btn-acl-save">Save</button>
      </div>
    </div>
  </div>

  <!-- Modal: Confirm Delete -->
  <div class="overlay hidden" id="modal-confirm">
    <div class="modal">
      <h2 id="confirm-title">Confirm Delete</h2>
      <p class="confirm-text" id="confirm-text"></p>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="btn-confirm-cancel">Cancel</button>
        <button class="btn btn-danger" id="btn-confirm-ok">Delete</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    const $ = id => document.getElementById(id);

    let activeScope = null;
    let activeTab = 'secrets';
    let confirmCallback = null;
    let activeProfile = null;   // name string or null (use CLI default)
    let allProfiles = [];
    let pickerSelectedProfile = null;

    // ── API ──────────────────────────────────────────────────────────────────

    async function api(method, path, body) {
      const headers = {};
      if (body) headers['Content-Type'] = 'application/json';
      if (activeProfile) headers['X-Profile'] = activeProfile;

      const res = await fetch(path, {
        method,
        headers,
        body: body ? JSON.stringify(body) : undefined,
      });
      const json = await res.json();
      if (!json.ok) {
        const err = new Error(json.error || 'Request failed');
        err.authRequired = json.authRequired;
        throw err;
      }
      return json.data;
    }

    // ── Toast ────────────────────────────────────────────────────────────────

    let toastTimer;
    function toast(msg, type = 'success') {
      const el = $('toast');
      el.textContent = msg;
      el.className = `show ${type}`;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { el.className = ''; }, 3500);
    }

    // ── Modals ───────────────────────────────────────────────────────────────

    function openModal(id) { $(id).classList.remove('hidden'); }
    function closeModal(id) { $(id).classList.add('hidden'); }

    function confirm(title, text, cb) {
      $('confirm-title').textContent = title;
      $('confirm-text').innerHTML = text;
      confirmCallback = cb;
      openModal('modal-confirm');
    }

    $('btn-confirm-cancel').onclick = () => closeModal('modal-confirm');
    $('btn-confirm-ok').onclick = async () => {
      closeModal('modal-confirm');
      if (confirmCallback) await confirmCallback();
    };

    // ── Profile picker ───────────────────────────────────────────────────────

    async function loadProfiles() {
      try {
        const profiles = await api('GET', '/api/profiles') || [];
        allProfiles = profiles;
        return profiles;
      } catch {
        return [];
      }
    }

    function renderProfileList(profiles) {
      const list = $('profile-list');
      if (!profiles.length) {
        list.innerHTML = '<p style="font-size:12px;color:var(--muted);text-align:center;padding:16px 0;">No profiles found in ~/.databrickscfg</p>';
        return;
      }

      // Default selection: first valid profile, or first profile
      const defaultPick = profiles.find(p => p.valid && p.default)
        || profiles.find(p => p.valid)
        || profiles[0];
      pickerSelectedProfile = defaultPick?.name || null;

      list.innerHTML = profiles.map(p => `
        <div class="profile-option ${p.name === pickerSelectedProfile ? 'selected' : ''}" data-pname="${p.name}">
          <div class="po-indicator"></div>
          <div class="po-body">
            <div class="po-name">
              ${p.name}
              ${p.valid ? '<span class="tag tag-valid">authenticated</span>' : '<span class="tag tag-invalid">not authenticated</span>'}
              ${p.default ? '<span class="tag tag-default">default</span>' : ''}
            </div>
            <div class="po-host">${p.host || ''}</div>
          </div>
        </div>
      `).join('');

      list.querySelectorAll('.profile-option').forEach(el => {
        el.onclick = () => {
          pickerSelectedProfile = el.dataset.pname;
          list.querySelectorAll('.profile-option').forEach(x => x.classList.remove('selected'));
          el.classList.add('selected');
          updateAuthHint();
        };
      });

      updateAuthHint();
    }

    function updateAuthHint() {
      const hint = $('auth-hint');
      const profile = allProfiles.find(p => p.name === pickerSelectedProfile);
      if (profile && !profile.valid) {
        hint.style.display = 'block';
        $('auth-hint-cmd').textContent = `databricks auth login -p ${profile.name}`;
        $('btn-profile-retry').classList.remove('hidden');
      } else {
        hint.style.display = 'none';
        $('btn-profile-retry').classList.add('hidden');
      }
    }

    function openProfilePicker(reason) {
      $('profile-modal-reason').textContent = reason || 'Choose a Databricks CLI profile to connect with.';
      renderProfileList(allProfiles);
      openModal('modal-profile');
    }

    $('btn-profile-connect').onclick = async () => {
      const profile = allProfiles.find(p => p.name === pickerSelectedProfile);
      if (!profile) return;
      if (!profile.valid) {
        toast(`"${profile.name}" is not authenticated — run the command shown below first.`, 'error');
        return;
      }
      closeModal('modal-profile');
      activeProfile = profile.name;
      renderProfileChip(profile);
      resetWorkspace();
      await loadScopes();
    };

    $('btn-profile-retry').onclick = async () => {
      const profiles = await loadProfiles();
      allProfiles = profiles;
      renderProfileList(profiles);
    };

    function renderProfileChip(profile) {
      $('profile-chip').innerHTML = `
        <div class="profile-badge">
          <div class="dot ${profile?.valid === false ? 'invalid' : ''}"></div>
          <span class="name">${profile?.name ?? 'default'}</span>
        </div>
        <button class="btn btn-ghost btn-icon" id="btn-switch-profile">Switch</button>
      `;
      $('btn-switch-profile').onclick = async () => {
        allProfiles = await loadProfiles();
        openProfilePicker('Switch to a different Databricks CLI profile.');
      };
    }

    function resetWorkspace() {
      activeScope = null;
      $('main-header').style.display = 'none';
      $('content').innerHTML = '<div class="empty"><div class="icon">🔐</div><p>Select a scope to manage secrets</p></div>';
    }

    // ── Auth error handler ───────────────────────────────────────────────────

    async function handleAuthError() {
      allProfiles = await loadProfiles();
      openProfilePicker('Authentication failed. Please select a valid profile.');
    }

    // ── Scopes ───────────────────────────────────────────────────────────────

    function fmtTs(ms) {
      if (!ms) return '—';
      return new Date(ms).toLocaleString(undefined, { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    async function loadScopes() {
      const list = $('scopes-list');
      list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);font-size:11px;"><span class="spinner"></span> Loading…</div>';
      try {
        const scopes = await api('GET', '/api/scopes') || [];
        if (scopes.length === 0) {
          list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);font-size:11px;">No scopes found</div>';
          return;
        }
        list.innerHTML = scopes.map(s => `
          <div class="scope-item ${activeScope === s.name ? 'active' : ''}" data-scope="${s.name}">
            <span class="scope-icon">⬡</span>
            <span class="scope-name">${s.name}</span>
            <span class="scope-type">${s.backend_type === 'DATABRICKS' ? '' : s.backend_type}</span>
          </div>
        `).join('');
        list.querySelectorAll('.scope-item').forEach(el => {
          el.onclick = () => selectScope(el.dataset.scope);
        });
      } catch (e) {
        if (e.authRequired) {
          list.innerHTML = '<div style="padding:16px;text-align:center;color:var(--muted);font-size:11px;">Not authenticated</div>';
          await handleAuthError();
        } else {
          list.innerHTML = `<div style="padding:16px;color:var(--red);font-size:11px;">Error: ${e.message}</div>`;
        }
      }
    }

    function selectScope(name) {
      activeScope = name;
      document.querySelectorAll('.scope-item').forEach(el => {
        el.classList.toggle('active', el.dataset.scope === name);
      });
      $('main-header').style.display = 'flex';
      loadTab();
    }

    // ── Tabs ─────────────────────────────────────────────────────────────────

    document.querySelectorAll('.tab').forEach(t => {
      t.onclick = () => {
        document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
        t.classList.add('active');
        activeTab = t.dataset.tab;
        $('btn-add').textContent = activeTab === 'secrets' ? '+ Add Secret' : '+ Add ACL';
        loadTab();
      };
    });

    function loadTab() {
      if (activeTab === 'secrets') loadSecrets();
      else loadAcls();
      $('btn-add').textContent = activeTab === 'secrets' ? '+ Add Secret' : '+ Add ACL';
    }

    // ── Secrets ──────────────────────────────────────────────────────────────

    async function loadSecrets() {
      const content = $('content');
      content.innerHTML = '<div class="table-wrap"><table><thead><tr><th>Key</th><th>Last Updated</th><th></th></tr></thead><tbody><tr class="loading-row"><td colspan="3"><span class="spinner"></span> Loading…</td></tr></tbody></table></div>';
      try {
        const secrets = await api('GET', `/api/scopes/${activeScope}/secrets`) || [];
        if (secrets.length === 0) {
          content.innerHTML = '<div class="empty"><div class="icon">🗝</div><p>No secrets in this scope</p></div>';
          return;
        }
        const rows = secrets.map(s => `
          <tr>
            <td class="key-cell">${s.key}</td>
            <td class="ts-cell">${fmtTs(s.last_updated_timestamp)}</td>
            <td>
              <div class="row-actions">
                <button class="btn btn-ghost btn-icon" data-edit="${s.key}">Edit</button>
                <button class="btn btn-danger btn-icon" data-del="${s.key}">Delete</button>
              </div>
            </td>
          </tr>
        `).join('');
        content.innerHTML = `<div class="table-wrap"><table><thead><tr><th>Key</th><th>Last Updated</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>`;
        content.querySelectorAll('[data-edit]').forEach(btn => btn.onclick = () => openEditSecret(btn.dataset.edit));
        content.querySelectorAll('[data-del]').forEach(btn => btn.onclick = () => deleteSecret(btn.dataset.del));
      } catch (e) {
        if (e.authRequired) { await handleAuthError(); return; }
        content.innerHTML = `<div class="empty"><p style="color:var(--red)">Error: ${e.message}</p></div>`;
      }
    }

    // ── ACLs ─────────────────────────────────────────────────────────────────

    async function loadAcls() {
      const content = $('content');
      content.innerHTML = '<div class="table-wrap"><table><thead><tr><th>Principal</th><th>Permission</th><th></th></tr></thead><tbody><tr class="loading-row"><td colspan="3"><span class="spinner"></span> Loading…</td></tr></tbody></table></div>';
      try {
        const acls = await api('GET', `/api/scopes/${activeScope}/acls`) || [];
        if (acls.length === 0) {
          content.innerHTML = '<div class="empty"><div class="icon">🔒</div><p>No ACLs configured</p></div>';
          return;
        }
        const rows = acls.map(a => `
          <tr>
            <td class="key-cell">${a.principal}</td>
            <td><span class="perm perm-${a.permission}">${a.permission}</span></td>
            <td>
              <div class="row-actions">
                <button class="btn btn-danger btn-icon" data-del-acl="${a.principal}">Delete</button>
              </div>
            </td>
          </tr>
        `).join('');
        content.innerHTML = `<div class="table-wrap"><table><thead><tr><th>Principal</th><th>Permission</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>`;
        content.querySelectorAll('[data-del-acl]').forEach(btn => btn.onclick = () => deleteAcl(btn.dataset.delAcl));
      } catch (e) {
        if (e.authRequired) { await handleAuthError(); return; }
        content.innerHTML = `<div class="empty"><p style="color:var(--red)">Error: ${e.message}</p></div>`;
      }
    }

    // ── New scope ─────────────────────────────────────────────────────────────

    $('btn-new-scope').onclick = () => {
      $('input-scope-name').value = '';
      openModal('modal-scope');
      setTimeout(() => $('input-scope-name').focus(), 50);
    };
    $('btn-scope-cancel').onclick = () => closeModal('modal-scope');
    $('btn-scope-create').onclick = async () => {
      const name = $('input-scope-name').value.trim();
      if (!name) return;
      try {
        $('btn-scope-create').disabled = true;
        await api('POST', '/api/scopes', { name });
        closeModal('modal-scope');
        toast(`Scope "${name}" created`);
        await loadScopes();
        selectScope(name);
      } catch (e) {
        if (e.authRequired) { closeModal('modal-scope'); await handleAuthError(); return; }
        toast(e.message, 'error');
      } finally {
        $('btn-scope-create').disabled = false;
      }
    };

    // ── Delete scope ──────────────────────────────────────────────────────────

    $('btn-delete-scope').onclick = () => {
      confirm('Delete Scope', `Permanently delete scope <strong>${activeScope}</strong> and all its secrets?`, async () => {
        try {
          await api('DELETE', `/api/scopes/${activeScope}`);
          toast(`Scope "${activeScope}" deleted`);
          resetWorkspace();
          await loadScopes();
        } catch (e) {
          if (e.authRequired) { await handleAuthError(); return; }
          toast(e.message, 'error');
        }
      });
    };

    // ── Add/Edit secret ───────────────────────────────────────────────────────

    $('btn-add').onclick = () => { if (activeTab === 'secrets') openAddSecret(); else openAddAcl(); };

    function openAddSecret() {
      $('modal-secret-title').textContent = 'Add Secret';
      $('input-secret-key').value = '';
      $('input-secret-value').value = '';
      $('field-key').style.display = '';
      openModal('modal-secret');
      setTimeout(() => $('input-secret-key').focus(), 50);
    }

    function openEditSecret(key) {
      $('modal-secret-title').textContent = `Edit Secret: ${key}`;
      $('input-secret-key').value = key;
      $('input-secret-value').value = '';
      $('field-key').style.display = 'none';
      openModal('modal-secret');
      setTimeout(() => $('input-secret-value').focus(), 50);
    }

    $('btn-secret-cancel').onclick = () => closeModal('modal-secret');
    $('btn-secret-save').onclick = async () => {
      const key = $('input-secret-key').value.trim();
      const value = $('input-secret-value').value;
      if (!key) return toast('Key is required', 'error');
      try {
        $('btn-secret-save').disabled = true;
        await api('PUT', `/api/scopes/${activeScope}/secrets/${encodeURIComponent(key)}`, { value });
        closeModal('modal-secret');
        toast(`Secret "${key}" saved`);
        loadSecrets();
      } catch (e) {
        if (e.authRequired) { closeModal('modal-secret'); await handleAuthError(); return; }
        toast(e.message, 'error');
      } finally {
        $('btn-secret-save').disabled = false;
      }
    };

    function deleteSecret(key) {
      confirm('Delete Secret', `Delete secret <strong>${key}</strong> from scope <strong>${activeScope}</strong>?`, async () => {
        try {
          await api('DELETE', `/api/scopes/${activeScope}/secrets/${encodeURIComponent(key)}`);
          toast(`Secret "${key}" deleted`);
          loadSecrets();
        } catch (e) {
          if (e.authRequired) { await handleAuthError(); return; }
          toast(e.message, 'error');
        }
      });
    }

    // ── ACL ───────────────────────────────────────────────────────────────────

    function openAddAcl() {
      $('input-acl-principal').value = '';
      $('input-acl-perm').value = 'READ';
      openModal('modal-acl');
      setTimeout(() => $('input-acl-principal').focus(), 50);
    }

    $('btn-acl-cancel').onclick = () => closeModal('modal-acl');
    $('btn-acl-save').onclick = async () => {
      const principal = $('input-acl-principal').value.trim();
      const permission = $('input-acl-perm').value;
      if (!principal) return toast('Principal is required', 'error');
      try {
        $('btn-acl-save').disabled = true;
        await api('PUT', `/api/scopes/${activeScope}/acls/${encodeURIComponent(principal)}`, { permission });
        closeModal('modal-acl');
        toast(`ACL saved for "${principal}"`);
        loadAcls();
      } catch (e) {
        if (e.authRequired) { closeModal('modal-acl'); await handleAuthError(); return; }
        toast(e.message, 'error');
      } finally {
        $('btn-acl-save').disabled = false;
      }
    };

    function deleteAcl(principal) {
      confirm('Delete ACL', `Remove ACL for <strong>${principal}</strong>?`, async () => {
        try {
          await api('DELETE', `/api/scopes/${activeScope}/acls/${encodeURIComponent(principal)}`);
          toast(`ACL for "${principal}" deleted`);
          loadAcls();
        } catch (e) {
          if (e.authRequired) { await handleAuthError(); return; }
          toast(e.message, 'error');
        }
      });
    }

    // ── Misc ──────────────────────────────────────────────────────────────────

    $('btn-refresh').onclick = () => loadTab();
    $('input-scope-name').onkeydown = e => { if (e.key === 'Enter') $('btn-scope-create').click(); };

    ['modal-scope', 'modal-secret', 'modal-acl', 'modal-confirm'].forEach(id => {
      $(id).addEventListener('click', e => { if (e.target === $(id)) closeModal(id); });
    });

    // ── Init ──────────────────────────────────────────────────────────────────

    async function init() {
      const profiles = await loadProfiles();

      // Find the best default: the default+valid profile, or any valid profile
      const best = profiles.find(p => p.valid && p.default)
        || profiles.find(p => p.valid);

      if (best) {
        activeProfile = best.name;
        renderProfileChip(best);
        await loadScopes();
      } else if (profiles.length > 0) {
        // Profiles exist but none are authenticated — show picker
        openProfilePicker('No authenticated profile found. Select a profile to connect.');
      } else {
        // No profiles at all — still try with default CLI auth
        await loadScopes();
      }
    }

    init();
  </script>
</body>
</html>
